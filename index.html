<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>المحول الذكي + أخبار البورصة</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<button onclick="toggleTheme()" class="theme-btn">🌙 / ☀️</button>

<header>
  <h1>🔄 المحول الذكي</h1>
  <nav>
    <a href="#converter">المحول</a> |
    <a href="#news">أخبار البورصة</a>
  </nav>
</header>

<section id="converter">
  <div class="category">
    <button onclick="setCategory('currency',this)">💵 عملات</button>
    <button onclick="setCategory('temp',this)">🌡️ حرارة</button>
    <button onclick="setCategory('length',this)">📏 طول</button>
    <button onclick="setCategory('weight',this)">⚖️ وزن</button>
    <button onclick="setCategory('time',this)">⏰ وقت</button>
    <button onclick="setCategory('data',this)">💾 بيانات</button>
    <button onclick="setCategory('area',this)">🗺️ مساحة</button>
  </div>

<input type="tel" id="value" placeholder="اكتب الرقم" pattern="[0-9]*" inputmode="numeric">
  <br>
  <select id="from"></select>
  <select id="to"></select>
  <br>
  <button class="convert" onclick="convert()">تحويل</button>
  <div id="result"></div>
</section>

<section id="news" class="news-widget">
  <h2>📊 أسعار الدولار وأخبار البورصة</h2>
  <div class="currency" id="currency-section"></div>
  <div class="news" id="news-section"></div>
  <p class="update" id="last-update"></p>
</section>

<script src="converter.js"></script>
<script src="news.js"></script>

<script>
function toggleTheme(){
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
