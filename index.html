<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>المحول الشامل</title>
<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color: white;
  text-align: center;
  padding: 20px;
}

/* الأزرار */
.category button {
  margin: 5px;
  padding: 10px 15px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  background: rgba(255,255,255,0.1);
  color: white;
  transition: 0.3s;
}

.category button:hover {
  background: rgba(255,165,0,0.7);
}

.active {
  background: rgba(255,165,0,0.8) !important;
}

/* الحقول */
input, select {
  margin: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  width: 150px;
  text-align: center;
}

/* خانة البحث */
#searchUnit {
  width: 300px;
  margin-bottom: 10px;
}

/* زر التحويل */
.convert {
  padding: 12px 25px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(45deg,#ff7a18,#ffb347);
  color: white;
  cursor: pointer;
  margin-top: 10px;
  transition: 0.3s;
}

.convert:hover {
  transform: scale(1.05);
}

/* النتيجة */
#result {
  margin-top: 20px;
  font-size: 22px;
  color: #00ffcc;
}
</style>
</head>
<body>

<h1>🔄 المحول الشامل</h1>

<!-- أزرار الفئات -->
<div class="category">
  <button onclick="setCategory('currency',this)">💵 عملات</button>
  <button onclick="setCategory('temp',this)">🌡️ حرارة</button>
  <button onclick="setCategory('length',this)">📏 طول</button>
  <button onclick="setCategory('weight',this)">⚖️ وزن</button>
  <button onclick="setCategory('time',this)">⏰ وقت</button>
  <button onclick="setCategory('data',this)">💾 بيانات</button>
  <button onclick="setCategory('area',this)">🗺️ مساحة</button>
</div>

<br>

<input type="number" id="value" placeholder="اكتب الرقم">
<br>
<input type="text" id="searchUnit" placeholder="ابحث عن الوحدة هنا (اختياري)" oninput="searchUnits()">
<br>

<select id="from"></select>
<select id="to"></select>

<br>
<button class="convert" onclick="convert()">تحويل</button>

<div id="result"></div>

<script>
let current = "currency";

// وحدات موسعة بالعربي
const units = {
  currency:["دولار أمريكي","دينار عراقي","يورو","ريال سعودي","جنيه مصري","درهم إماراتي","ريال قطري","دينار كويتي","دينار بحريني"],
  temp:["C","F","K"],
  length:["مم","سم","م","كم","إنش","قدم","ياردة","ميل"],
  weight:["غرام","كغ","طن","أونصة","رطل"],
  time:["ثانية","دقيقة","ساعة","يوم","أسبوع","شهر","سنة"],
  data:["Bit","Byte","KB","MB","GB","TB"],
  area:["م²","كم²","هكتار","أكر","إنش²","قدم²","ياردة²","ميل²"]
};

// أسعار ثابتة مقابل الدولار
const currencyRates = {
  "دولار أمريكي":1,
  "دينار عراقي":1300,
  "يورو":0.93,
  "ريال سعودي":3.75,
  "جنيه مصري":30,
  "درهم إماراتي":3.67,
  "ريال قطري":3.64,
  "دينار كويتي":0.31,
  "دينار بحريني":0.38
};

function setCategory(cat, btn){
  current = cat;
  document.querySelectorAll(".category button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  updateUnits();
}

function updateUnits(filtered=null){
  let from=document.getElementById("from");
  let to=document.getElementById("to");
  from.innerHTML=""; to.innerHTML="";
  let list = filtered || units[current];
  list.forEach(u=>{
    from.innerHTML+=`<option>${u}</option>`;
    to.innerHTML+=`<option>${u}</option>`;
  });
}

function searchUnits(){
  let query=document.getElementById("searchUnit").value.toLowerCase();
  let filtered=units[current].filter(u=>u.toLowerCase().includes(query));
  updateUnits(filtered);
}

function convert(){
  let v=parseFloat(document.getElementById("value").value);
  if(isNaN(v)){document.getElementById("result").innerText="الرجاء كتابة رقم صحيح"; return;}
  let from=document.getElementById("from").value;
  let to=document.getElementById("to").value;
  let r=v;

  // العملات
  if(current==="currency") r=v/currencyRates[from]*currencyRates[to];

  // الحرارة
  if(current==="temp"){
    if(from==="C" && to==="F") r=(v*9/5)+32;
    else if(from==="F" && to==="C") r=(v-32)*5/9;
    else if(from==="C" && to==="K") r=v+273.15;
    else if(from==="K" && to==="C") r=v-273.15;
    else if(from==="F" && to==="K") r=(v-32)*5/9+273.15;
    else if(from==="K" && to==="F") r=(v-273.15)*9/5+32;
  }

  // الطول
  if(current==="length"){
    // تحويل أولاً لكل وحدة للمتر
    let map={"مم":0.001,"سم":0.01,"م":1,"كم":1000,"إنش":0.0254,"قدم":0.3048,"ياردة":0.9144,"ميل":1609.34};
    r=v*map[from]/map[to];
  }

  // الوزن
  if(current==="weight"){
    let map={"غرام":0.001,"كغ":1,"طن":1000,"أونصة":0.0283495,"رطل":0.453592};
    r=v*map[from]/map[to];
  }

  // الوقت
  if(current==="time"){
    let map={"ثانية":1,"دقيقة":60,"ساعة":3600,"يوم":86400,"أسبوع":604800,"شهر":2629800,"سنة":31557600};
    r=v*map[from]/map[to];
  }

  // البيانات
  if(current==="data"){
    let map={"Bit":1,"Byte":8,"KB":8*1024,"MB":8*1024*1024,"GB":8*1024*1024*1024,"TB":8*1024*1024*1024*1024};
    r=v*map[from]/map[to];
  }

  // المساحة
  if(current==="area"){
    let map={"م²":1,"كم²":1e6,"هكتار":10000,"أكر":4046.86,"إنش²":0.00064516,"قدم²":0.092903,"ياردة²":0.836127,"ميل²":2.59e6};
    r=v*map[from]/map[to];
  }

  document.getElementById("result").innerText=r + " " + to;
}

updateUnits();
</script>

</body>
</html>
