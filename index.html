<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدخال أرقام فقط</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        input, button {
            font-size: 18px;
            padding: 10px;
            margin: 5px 0;
            width: 100%;
            max-width: 300px;
        }
        button {
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
        }
        button:hover {
            background-color: #45a049;
        }
        #result {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h2>إدخال أرقام فقط</h2>
    <label for="numberInput">أدخل الرقم:</label><br>
    <input type="number" id="numberInput" placeholder="أدخل الرقم هنا"><br>
    <button onclick="calculate()">احسب ×2</button>
    <p id="result"></p>

    <script>
        function calculate() {
            const input = document.getElementById('numberInput').value;
            const num = parseFloat(input);
            if (!isNaN(num)) {
                const result = num * 2; // مثال: نضرب الرقم في 2
                document.getElementById('result').innerText = `النتيجة: ${result}`;
            } else {
                document.getElementById('result').innerText = "الرجاء إدخال رقم صحيح!";
            }
        }
    </script>
</body>
</html>
